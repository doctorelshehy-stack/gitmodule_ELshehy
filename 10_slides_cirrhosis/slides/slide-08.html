<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform=`scale(${sc})`;s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script></head><body>
<div class="slide-content" style="background:#0d2137; overflow:hidden;">
  <div style="position:absolute; top:0; left:0; width:960px; height:540px;">
    <circle cx="160" cy="280" r="240" fill="#ffffff" opacity="0.04"/>
    <circle cx="800" cy="120" r="160" fill="#ffffff" opacity="0.04"/>
  </div>
  <div style="position:absolute; top:180px; left:80px; z-index:10;">
    <div style="width:80px; height:4px; background:#FFC107; border-radius:2px; margin-bottom:24px;"></div>
    <p style="font-family:'Times New Roman',serif; font-size:42px; font-weight:700; color:#ffffff; margin:0;">Prognosis</p>
    <p style="font-family:'Times New Roman',serif; font-size:18px; color:#FFC107; margin-top:12px;">Child-Turcotte-Pugh Score & MELD-Na</p>
  </div>
  <svg style="position:absolute; right:32px; bottom:24px; z-index:100;" width="40" height="40" aria-hidden="true">
  <circle cx="20" cy="20" r="18" fill="#0d2137" stroke="#1565C0" stroke-width="2"/>
  <text x="20" y="25" text-anchor="middle" fill="#ffffff" font-family="Times New Roman, serif" font-size="16" font-weight="bold">08</text>
</svg>
</div>
</body></html>
