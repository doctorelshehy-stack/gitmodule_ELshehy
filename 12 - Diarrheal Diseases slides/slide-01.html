<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide</title>
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform='scale('+sc+')';s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script>
</head>
<body>
<div class="slide-content">
<div style="position:absolute; inset:0; background:#264653;">
  <svg style="position:absolute; inset:0; width:100%; height:100%;" aria-hidden="true">
    <pattern id="g1" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1" fill="#2a9d8f" opacity="0.15"/>
    </pattern>
    <rect width="960" height="540" fill="url(#g1)"/>
  </svg>
  <div style="position:absolute; left:70px; top:110px; width:80px; height:5px; background:#e9c46a; border-radius:3px;"></div>
  <p style="position:absolute; left:70px; top:120px; font-family:'Times New Roman',serif; font-size:28px; color:#e9c46a; opacity:0.8; margin:0;">Tropical Support 41 Book</p>
  <p style="position:absolute; left:70px; top:168px; font-family:'Times New Roman',serif; font-size:52px; font-weight:700; color:#e9c46a; margin:0; line-height:1.1;">Diarrheal<br><span style="font-size:40px; color:#ffffff;">Diseases</span></p>
  <p style="position:absolute; left:70px; top:280px; font-family:'Times New Roman',serif; font-size:18px; color:#ffffff; opacity:0.7; margin:0; max-width:520px;">Acute &amp; Chronic Infectious Diarrhea — Viral, Bacterial &amp; Protozoal causes, diagnosis, treatment, SIBO, Tropical Sprue, Intestinal TB, and Whipple Disease.</p>
  <p style="position:absolute; left:70px; bottom:60px; font-family:'Times New Roman',serif; font-size:16px; color:#ffffff; opacity:0.5; margin:0;">Gastro-enterology &amp; Tropical Medicine</p>
  <svg style="position:absolute; right:60px; bottom:60px;" width="120" height="120" aria-hidden="true">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#2a9d8f" stroke-width="2" opacity="0.3"/>
    <circle cx="60" cy="60" r="35" fill="none" stroke="#e9c46a" stroke-width="1.5" opacity="0.4"/>
    <circle cx="60" cy="60" r="15" fill="none" stroke="#e76f51" stroke-width="1" opacity="0.5"/>
  </svg>
</div>
</div>
</body>
</html>
