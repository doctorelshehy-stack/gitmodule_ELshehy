<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" rx="8" fill="#f0f4f4"/>
  <rect x="0" y="0" width="300" height="36" rx="8" fill="#264653"/>
  <rect x="0" y="20" width="300" height="16" fill="#264653"/>
  <text x="150" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#fff">AIH Symptoms &amp; Signs</text>
  <!-- Symptoms list -->
  <circle cx="30" cy="58" r="5" fill="#2a9d8f"/>
  <text x="44" y="62" font-family="Arial,sans-serif" font-size="11" fill="#264653">Fatigue (87%)</text>
  <circle cx="30" cy="80" r="5" fill="#2a9d8f"/>
  <text x="44" y="84" font-family="Arial,sans-serif" font-size="11" fill="#264653">Dark urine / Pale stools</text>
  <circle cx="30" cy="102" r="5" fill="#2a9d8f"/>
  <text x="44" y="106" font-family="Arial,sans-serif" font-size="11" fill="#264653">RUQ abdominal pain</text>
  <circle cx="30" cy="124" r="5" fill="#2a9d8f"/>
  <text x="44" y="128" font-family="Arial,sans-serif" font-size="11" fill="#264653">Anorexia</text>
  <!-- Signs badget -->
  <rect x="15" y="146" width="270" height="22" rx="4" fill="#e76f51" opacity="0.12"/>
  <text x="150" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#264653">Signs: Jaundice, Spider angiomata, Ascites</text>
  <!-- Female icon -->
  <rect x="230" y="50" width="50" height="50" rx="25" fill="#2a9d8f" opacity="0.15"/>
  <text x="255" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#2a9d8f">&#9792;</text>
  <text x="255" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#264653">Female</text>
  <text x="255" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#264653">4th-5th decade</text>
</svg>