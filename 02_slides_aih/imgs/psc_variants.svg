<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" rx="8" fill="#f0f4f4"/>
  <rect x="0" y="0" width="300" height="36" rx="8" fill="#264653"/>
  <rect x="0" y="20" width="300" height="16" fill="#264653"/>
  <text x="150" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">PSC Variants &amp; Overlap</text>
  <!-- Small duct PSC -->
  <rect x="15" y="46" width="270" height="30" rx="5" fill="#2a9d8f" opacity="0.1"/>
  <rect x="15" y="46" width="5" height="30" rx="2" fill="#2a9d8f"/>
  <text x="28" y="56" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#264653">Small Duct PSC</text>
  <text x="28" y="70" font-family="Arial,sans-serif" font-size="9" fill="#264653">Microscope-only | May progress to classic PSC</text>
  <!-- IgG4-PSC -->
  <rect x="15" y="82" width="270" height="30" rx="5" fill="#e9c46a" opacity="0.12"/>
  <rect x="15" y="82" width="5" height="30" rx="2" fill="#e9c46a"/>
  <text x="28" y="92" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#264653">IgG4-Associated Cholangitis</text>
  <text x="28" y="106" font-family="Arial,sans-serif" font-size="9" fill="#264653">IgG4 &gt; 280 mg/dL | Pancreatitis</text>
  <!-- AIH-PSC Overlap -->
  <rect x="15" y="118" width="270" height="30" rx="5" fill="#f4a261" opacity="0.12"/>
  <rect x="15" y="118" width="5" height="30" rx="2" fill="#f4a261"/>
  <text x="28" y="128" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#264653">AIH-PSC Overlap</text>
  <text x="28" y="142" font-family="Arial,sans-serif" font-size="9" fill="#264653">ANA + ASMA | Interface hepatitis | PSC on imaging</text>
  <!-- Key message -->
  <rect x="15" y="160" width="270" height="30" rx="4" fill="#e76f51" opacity="0.08"/>
  <text x="150" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#264653">All PSC patients: measure IgG4!</text>
  <text x="150" y="184" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#264653">Treatment: Steroids + UDCA</text>
</svg>