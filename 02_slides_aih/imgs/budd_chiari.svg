<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" rx="8" fill="#f0f4f4"/>
  <rect x="0" y="0" width="300" height="36" rx="8" fill="#264653"/>
  <rect x="0" y="20" width="300" height="16" fill="#264653"/>
  <text x="150" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">Budd-Chiari Syndrome</text>
  <!-- DAM illustration -->
  <rect x="30" y="50" width="80" height="60" rx="6" fill="#e76f51" opacity="0.12"/>
  <text x="70" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#e76f51">DAM</text>
  <!-- River -->
  <rect x="110" y="65" width="50" height="10" rx="4" fill="#2a9d8f" opacity="0.4"/>
  <rect x="110" y="85" width="50" height="10" rx="4" fill="#2a9d8f" opacity="0.2"/>
  <rect x="30" y="110" width="80" height="6" rx="3" fill="#2a9d8f" opacity="0.3"/>
  <!-- Blockage symbol -->
  <rect x="140" y="55" width="8" height="55" rx="2" fill="#e76f51" opacity="0.7"/>
  <text x="180" y="62" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#264653">Blood clot blocks</text>
  <text x="180" y="78" font-family="Arial,sans-serif" font-size="11" fill="#264653">hepatic veins</text>
  <!-- Symptoms -->
  <rect x="15" y="128" width="270" height="22" rx="4" fill="#2a9d8f" opacity="0.1"/>
  <text x="150" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#264653">Sudden: RUQ pain + Ascites + Liver failure</text>
  <rect x="15" y="154" width="270" height="22" rx="4" fill="#e9c46a" opacity="0.1"/>
  <text x="150" y="169" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#264653">Gradual: Hepatomegaly + Ascites + Edema</text>
  <rect x="15" y="180" width="270" height="16" rx="4" fill="#f4a261" opacity="0.1"/>
  <text x="150" y="191" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#264653">Treatment: TIPSS + Anticoagulation</text>
</svg>