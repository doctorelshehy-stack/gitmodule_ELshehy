<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" rx="8" fill="#f0f4f4"/>
  <rect x="0" y="0" width="300" height="36" rx="8" fill="#264653"/>
  <rect x="0" y="20" width="300" height="16" fill="#264653"/>
  <text x="150" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">Hepatic Ischemia</text>
  <!-- Blood flow diagram -->
  <rect x="100" y="50" width="100" height="60" rx="8" fill="#e76f51" opacity="0.15"/>
  <path d="M150 50 L150 110" stroke="#e76f51" stroke-width="1.5" opacity="0.4"/>
  <path d="M100 80 L200 80" stroke="#e76f51" stroke-width="1.5" opacity="0.4"/>
  <text x="150" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#e76f51">LIVER</text>
  <!-- Blood flow arrows -->
  <path d="M30 70 L80 70" stroke="#2a9d8f" stroke-width="3" opacity="0.6"/>
  <polygon points="80,64 90,70 80,76" fill="#2a9d8f" opacity="0.6"/>
  <path d="M220 70 L270 70" stroke="#2a9d8f" stroke-width="3" opacity="0.6"/>
  <polygon points="270,64 280,70 270,76" fill="#2a9d8f" opacity="0.6"/>
  <text x="55" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#264653">Blood in</text>
  <text x="250" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#264653">Blood out</text>
  <!-- Triggers -->
  <rect x="15" y="126" width="270" height="22" rx="4" fill="#2a9d8f" opacity="0.1"/>
  <text x="150" y="141" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#264653">Trigger: Hypotension, seizures, blood loss</text>
  <rect x="15" y="152" width="270" height="22" rx="4" fill="#e9c46a" opacity="0.1"/>
  <text x="150" y="167" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#264653">Sign: Rising transaminases (alarm bell)</text>
  <rect x="15" y="178" width="270" height="18" rx="4" fill="#f4a261" opacity="0.1"/>
  <text x="150" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#264653">Treatment: Restore perfusion &amp; oxygen</text>
</svg>