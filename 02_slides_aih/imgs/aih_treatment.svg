<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" rx="8" fill="#f0f4f4"/>
  <rect x="0" y="0" width="300" height="36" rx="8" fill="#264653"/>
  <rect x="0" y="20" width="300" height="16" fill="#264653"/>
  <text x="150" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#fff">AIH Treatment</text>
  <!-- Step 1: Induction -->
  <rect x="15" y="46" width="270" height="40" rx="6" fill="#2a9d8f" opacity="0.12"/>
  <circle cx="35" cy="66" r="12" fill="#2a9d8f"/>
  <text x="35" y="71" text-anchor="middle" font-size="12" fill="#fff" font-family="Arial,sans-serif">1</text>
  <text x="55" y="62" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#264653">Induction: Steroids</text>
  <text x="55" y="78" font-family="Arial,sans-serif" font-size="9" fill="#264653">Prednisone 40-60mg tapering</text>
  <!-- Arrow -->
  <path d="M150 88 L150 96" stroke="#e9c46a" stroke-width="2"/>
  <path d="M145 94 L150 100 L155 94" stroke="#e9c46a" stroke-width="2" fill="none"/>
  <!-- Step 2: Maintenance -->
  <rect x="15" y="102" width="270" height="40" rx="6" fill="#e9c46a" opacity="0.15"/>
  <circle cx="35" cy="122" r="12" fill="#e9c46a"/>
  <text x="35" y="127" text-anchor="middle" font-size="12" fill="#264653" font-family="Arial,sans-serif">2</text>
  <text x="55" y="118" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#264653">Maintenance: Immunomodulators</text>
  <text x="55" y="134" font-family="Arial,sans-serif" font-size="9" fill="#264653">Azathioprine, Mycophenolate</text>
  <!-- Result box -->
  <rect x="15" y="155" width="270" height="35" rx="6" fill="#2a9d8f" opacity="0.1"/>
  <text x="150" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#2a9d8f">60-85% achieve remission</text>
  <text x="150" y="184" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#264653">Budesonide: fewer side effects</text>
</svg>