<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" rx="8" fill="#f0f4f4"/>
  <rect x="0" y="0" width="300" height="36" rx="8" fill="#264653"/>
  <rect x="0" y="20" width="300" height="16" fill="#264653"/>
  <text x="150" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">PSC: Diagnosis</text>
  <!-- Pipe diagram -->
  <rect x="30" y="46" width="240" height="14" rx="6" fill="#2a9d8f" opacity="0.3"/>
  <rect x="50" y="46" width="12" height="14" fill="#e76f51" opacity="0.6"/>
  <rect x="90" y="46" width="8" height="14" fill="#e76f51" opacity="0.7"/>
  <rect x="140" y="46" width="14" height="14" fill="#e76f51" opacity="0.5"/>
  <rect x="200" y="46" width="10" height="14" fill="#e76f51" opacity="0.6"/>
  <text x="150" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#264653">Multifocal strictures (beading)</text>
  <!-- Lab findings -->
  <rect x="15" y="72" width="270" height="24" rx="4" fill="#2a9d8f" opacity="0.1"/>
  <text x="150" y="87" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#264653">Lab: ALP 4-10× elevated | ALT &lt; 300</text>
  <!-- IBD connection -->
  <rect x="15" y="102" width="270" height="24" rx="4" fill="#e9c46a" opacity="0.12"/>
  <text x="150" y="117" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#264653">70-90% have IBD (mainly UC)</text>
  <!-- Imaging -->
  <rect x="15" y="132" width="270" height="24" rx="4" fill="#f4a261" opacity="0.12"/>
  <text x="150" y="147" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#264653">MRCP / ERCP: Multifocal strictures</text>
  <!-- Risk -->
  <rect x="15" y="162" width="270" height="28" rx="4" fill="#e76f51" opacity="0.08"/>
  <text x="150" y="176" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#e76f51">10-15% develop cholangiocarcinoma</text>
  <text x="150" y="186" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#264653">Onion skin periductal fibrosis on biopsy</text>
</svg>