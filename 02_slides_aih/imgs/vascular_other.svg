<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" rx="8" fill="#f0f4f4"/>
  <rect x="0" y="0" width="300" height="36" rx="8" fill="#264653"/>
  <rect x="0" y="20" width="300" height="16" fill="#264653"/>
  <text x="150" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#fff">Other Vascular Disorders</text>
  <!-- VOD -->
  <rect x="15" y="44" width="86" height="40" rx="5" fill="#2a9d8f" opacity="0.12"/>
  <text x="58" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#264653">VOD</text>
  <text x="58" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#264653">Small veins</text>
  <text x="58" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#264653">Defibrotide</text>
  <!-- Cardiac -->
  <rect x="107" y="44" width="86" height="40" rx="5" fill="#e9c46a" opacity="0.15"/>
  <text x="150" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#264653">Cardiac</text>
  <text x="150" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#264653">R heart failure</text>
  <text x="150" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#264653">Congestion</text>
  <!-- PVT -->
  <rect x="199" y="44" width="86" height="40" rx="5" fill="#f4a261" opacity="0.15"/>
  <text x="242" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#264653">PVT</text>
  <text x="242" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#264653">Portal vein</text>
  <text x="242" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#264653">Anticoagulation</text>
  <!-- Causes -->
  <rect x="15" y="96" width="270" height="22" rx="4" fill="#e76f51" opacity="0.08"/>
  <text x="150" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#264653">Causes: Herbal teas, Chemotherapy, Radiation</text>
  <rect x="15" y="122" width="270" height="22" rx="4" fill="#2a9d8f" opacity="0.08"/>
  <text x="150" y="137" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#264653">PVT: Thrombophilia, Inflammation, Cirrhosis</text>
  <!-- Doppler -->
  <rect x="15" y="152" width="270" height="38" rx="5" fill="#264653"/>
  <text x="150" y="167" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#e9c46a">Doppler Ultrasound = Clot Detector</text>
  <text x="150" y="181" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">Check PV patency in cirrhosis decompensation</text>
</svg>