<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" rx="8" fill="#f0f4f4"/>
  <rect x="0" y="0" width="300" height="36" rx="8" fill="#264653"/>
  <rect x="0" y="20" width="300" height="16" fill="#264653"/>
  <text x="150" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">Prognosis Comparison</text>
  <!-- AIH bar -->
  <rect x="15" y="46" width="80" height="14" rx="4" fill="#2a9d8f"/>
  <text x="15" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#264653">AIH</text>
  <text x="105" y="58" font-family="Arial,sans-serif" font-size="9" fill="#264653">60-85% remission with treatment</text>
  <text x="105" y="72" font-family="Arial,sans-serif" font-size="9" fill="#264653">80% respond to steroids</text>
  <!-- PBC bar -->
  <rect x="15" y="86" width="60" height="14" rx="4" fill="#e9c46a"/>
  <text x="15" y="112" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#264653">PBC</text>
  <text x="105" y="98" font-family="Arial,sans-serif" font-size="9" fill="#264653">Slow progression | UDCA helps</text>
  <text x="105" y="112" font-family="Arial,sans-serif" font-size="9" fill="#264653">Most asymptomatic initially</text>
  <!-- PSC bar -->
  <rect x="15" y="126" width="45" height="14" rx="4" fill="#e76f51"/>
  <text x="15" y="152" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#264653">PSC</text>
  <text x="105" y="138" font-family="Arial,sans-serif" font-size="9" fill="#264653">Progressive | 10-15% cholangiocarcinoma</text>
  <text x="105" y="152" font-family="Arial,sans-serif" font-size="9" fill="#264653">70-90% have IBD</text>
  <!-- Key message -->
  <rect x="15" y="168" width="270" height="24" rx="4" fill="#264653"/>
  <text x="150" y="184" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#e9c46a">Early detection = Better outcomes!</text>
</svg>