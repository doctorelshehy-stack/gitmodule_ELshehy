<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" rx="8" fill="#f0f4f4"/>
  <rect x="0" y="0" width="300" height="36" rx="8" fill="#264653"/>
  <rect x="0" y="20" width="300" height="16" fill="#264653"/>
  <text x="150" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">Lab Tests &amp; Histology</text>
  <!-- Test tube icon -->
  <rect x="20" y="50" width="20" height="55" rx="8" fill="none" stroke="#2a9d8f" stroke-width="2"/>
  <rect x="20" y="50" width="20" height="30" rx="0" fill="#2a9d8f" opacity="0.3"/>
  <text x="52" y="62" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#264653">AST/ALT &gt;10× normal</text>
  <text x="52" y="78" font-family="Arial,sans-serif" font-size="10" fill="#264653">Elevated IgG + Autoantibodies</text>
  <!-- Microscope area -->
  <rect x="20" y="100" width="30" height="20" rx="3" fill="#f4a261" opacity="0.3"/>
  <rect x="25" y="88" width="20" height="12" rx="2" fill="#f4a261" opacity="0.5"/>
  <text x="58" y="110" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#264653">Histology: Interface hepatitis</text>
  <text x="58" y="126" font-family="Arial,sans-serif" font-size="10" fill="#264653">Lymphoplasmacytic infiltrate</text>
  <!-- Key stat -->
  <rect x="15" y="160" width="270" height="30" rx="4" fill="#e76f51" opacity="0.1"/>
  <text x="150" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#264653">3% present with acute liver failure</text>
  <text x="150" y="184" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#264653">40% untreated die within 6 months</text>
</svg>