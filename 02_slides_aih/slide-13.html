<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Section — PSC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform=`scale(${sc})`;s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script>
</head>
<body>
<div class="slide-content" style="width:960px;height:540px;background:#264653;overflow:hidden;position:relative;">

  <svg aria-hidden="true" style="position:absolute;top:0;left:0;width:960px;height:540px;z-index:1;" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="960" height="540" fill="#264653"/>
    <rect x="0" y="0" width="480" height="540" fill="rgba(233,196,106,0.04)"/>
    <circle cx="240" cy="300" r="260" fill="rgba(42,157,143,0.05)"/>
    <rect x="0" y="0" width="960" height="5" fill="#e9c46a"/>
    <rect x="0" y="535" width="960" height="5" fill="#e9c46a"/>
  </svg>

  <p style="position:absolute;top:80px;left:80px;font-family:'Times New Roman',serif;font-size:100px;font-weight:700;color:#2a9d8f;z-index:10;margin:0;line-height:1;">
    03
  </p>

  <p style="position:absolute;top:200px;left:80px;right:80px;font-family:'Times New Roman',serif;font-size:42px;font-weight:700;color:#fff;z-index:10;margin:0;">
    Primary Sclerosing Cholangitis
  </p>

  <div style="position:absolute;top:285px;left:80px;width:100px;height:4px;background:#f4a261;z-index:10;border-radius:2px;"></div>

  <p style="position:absolute;top:315px;left:80px;right:80px;font-family:'Times New Roman',serif;font-size:18px;font-weight:400;color:rgba(255,255,255,0.7);z-index:10;margin:0;">
    Progressive inflammatory disease of intra- and extrahepatic bile ducts —<br>strongly associated with IBD and risk of cholangiocarcinoma.
  </p>

  <svg aria-hidden="true" style="position:absolute;right:32px;bottom:24px;width:40px;height:40px;z-index:50;" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="40" height="40" rx="20" fill="#2a9d8f"/>
  <text x="20" y="28" text-anchor="middle" font-family="Times New Roman,serif" font-size="18" font-weight="700" fill="#fff">13</text>
</svg>
</div>
</body>
</html>
