<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide</title>
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform='scale('+sc+')';s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script>
</head>
<body>
<div class="slide-content">
<div style="position:absolute; inset:0; background:#264653;">
  <svg style="position:absolute; inset:0; width:100%; height:100%;" aria-hidden="true">
    <pattern id="dots3" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#2a9d8f" opacity="0.12"/>
    </pattern>
    <rect width="960" height="540" fill="url(#dots3)"/>
  </svg>
  <div style="position:absolute; left:80px; top:0; width:2px; height:540px; background:#e9c46a; opacity:0.4;"></div>
  <p style="position:absolute; left:120px; top:180px; font-family:'Times New Roman',serif; font-size:80px; font-weight:700; color:#e9c46a; margin:0; opacity:0.3;">01</p>
  <p style="position:absolute; left:120px; top:240px; font-family:'Times New Roman',serif; font-size:42px; font-weight:700; color:#ffffff; margin:0;">Toxoplasmosis</p>
  <div style="position:absolute; left:120px; top:300px; width:60px; height:4px; background:#e9c46a; border-radius:2px;"></div>
  <p style="position:absolute; left:120px; top:320px; font-family:'Times New Roman',serif; font-size:16px; color:#e9c46a; opacity:0.7; margin:0; max-width:400px;">Causative organism, transmission, clinical manifestations, diagnosis, and treatment</p>
  <svg style="position:absolute; right:32px; bottom:24px; width:40px; height:24px;" aria-hidden="true">
      <rect x="0" y="2" width="40" height="20" rx="10" fill="#2a9d8f" opacity="0.85"/>
      <text x="20" y="16" text-anchor="middle" fill="#ffffff" font-family="'Times New Roman',serif" font-size="12" font-weight="700">03</text>
    </svg>
</div>
</div>
</body>
</html>
