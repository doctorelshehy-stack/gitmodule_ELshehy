<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" rx="8" fill="#f5f0e8"/>
  <rect x="0" y="0" width="300" height="34" rx="8" fill="#780000"/>
  <rect x="0" y="18" width="300" height="16" fill="#780000"/>
  <text x="150" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">UGIB: Symptoms &amp; Signs</text>
  <rect x="10" y="42" width="90" height="18" rx="3" fill="#003049"/>
  <text x="55" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#fff">Term</text>
  <rect x="100" y="42" width="190" height="18" rx="3" fill="#003049"/>
  <text x="195" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#fff">Meaning</text>
  <text x="14" y="74" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#780000">Hematemesis</text>
  <text x="14" y="90" font-family="Arial,sans-serif" font-size="9" fill="#003049">Vomiting blood (coffee-ground or fresh)</text>
  <line x1="10" y1="96" x2="290" y2="96" stroke="#ccc" stroke-width="0.5"/>
  <text x="14" y="110" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#780000">Melena</text>
  <text x="14" y="126" font-family="Arial,sans-serif" font-size="9" fill="#003049">Tarry stool — blood in GI &gt;14 hrs</text>
  <line x1="10" y1="132" x2="290" y2="132" stroke="#ccc" stroke-width="0.5"/>
  <text x="14" y="146" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#780000">Hematochezia</text>
  <text x="14" y="162" font-family="Arial,sans-serif" font-size="9" fill="#003049">Bright red blood PR — usually LGIB</text>
  <rect x="10" y="174" width="280" height="20" rx="4" fill="#c1121f" opacity="0.06"/>
  <text x="150" y="187" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#003049">Signs: Shock, pallor, jaundice, spider nevi</text>
</svg>