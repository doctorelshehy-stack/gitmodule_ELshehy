<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" rx="8" fill="#f5f0e8"/>
  <rect x="0" y="0" width="300" height="34" rx="8" fill="#780000"/>
  <rect x="0" y="18" width="300" height="16" fill="#780000"/>
  <text x="150" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#fff">Esophageal Varices Management</text>
  <rect x="10" y="42" width="280" height="42" rx="4" fill="#780000" opacity="0.08"/>
  <rect x="10" y="42" width="5" height="42" rx="2" fill="#780000"/>
  <text x="22" y="56" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#780000">EBL = First Line</text>
  <text x="22" y="72" font-family="Arial,sans-serif" font-size="9" fill="#003049">Band ligation every 2–4 weeks until eradication</text>
  <rect x="10" y="90" width="280" height="42" rx="4" fill="#669bbc" opacity="0.1"/>
  <rect x="10" y="90" width="5" height="42" rx="2" fill="#669bbc"/>
  <text x="22" y="104" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#003049">Sclerotherapy (alternative)</text>
  <text x="22" y="120" font-family="Arial,sans-serif" font-size="9" fill="#003049">Ethanolamine oleate — more complications</text>
  <rect x="10" y="140" width="135" height="30" rx="4" fill="#780000" opacity="0.06"/>
  <text x="77" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#780000">EBL Superior</text>
  <text x="77" y="166" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#003049">Lower rebleeding</text>
  <rect x="155" y="140" width="135" height="30" rx="4" fill="#c1121f" opacity="0.06"/>
  <text x="222" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#c1121f">Sclerotherapy</text>
  <text x="222" y="166" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#003049">More complications</text>
  <rect x="10" y="178" width="280" height="16" rx="4" fill="#003049" opacity="0.08"/>
  <text x="150" y="189" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#003049">Vasoactive drugs BEFORE endoscopy if variceal suspected</text>
</svg>