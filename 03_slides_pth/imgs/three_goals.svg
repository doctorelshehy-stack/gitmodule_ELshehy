<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" rx="8" fill="#f5f0e8"/>
  <rect x="0" y="0" width="300" height="34" rx="8" fill="#003049"/>
  <rect x="0" y="18" width="300" height="16" fill="#003049"/>
  <text x="150" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#fff">Management: 3 Goals</text>
  <!-- Goal 1 -->
  <rect x="10" y="42" width="90" height="42" rx="4" fill="#780000" opacity="0.12"/>
  <text x="55" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#780000">Goal 1</text>
  <text x="55" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#003049">Evaluate</text>
  <text x="55" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#003049">Hemodynamics</text>
  <!-- Goal 2 -->
  <rect x="105" y="42" width="90" height="42" rx="4" fill="#669bbc" opacity="0.15"/>
  <text x="150" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#003049">Goal 2</text>
  <text x="150" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#003049">Resuscitate</text>
  <text x="150" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#003049">IV fluids + blood + PPI</text>
  <!-- Goal 3 -->
  <rect x="200" y="42" width="90" height="42" rx="4" fill="#c1121f" opacity="0.1"/>
  <text x="245" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#c1121f">Goal 3</text>
  <text x="245" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#003049">Control</text>
  <text x="245" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#003049">Endoscopy</text>
  <!-- Details -->
  <rect x="10" y="94" width="280" height="22" rx="3" fill="#780000" opacity="0.05"/>
  <text x="150" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#003049">Resuscitation: Target Hb 7–9 g/dL</text>
  <rect x="10" y="120" width="280" height="22" rx="3" fill="#669bbc" opacity="0.08"/>
  <text x="150" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#003049">PPI: 80 mg bolus → 8 mg/h × 72h</text>
  <rect x="10" y="146" width="280" height="22" rx="3" fill="#c1121f" opacity="0.05"/>
  <text x="150" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#003049">Variceal: Vasoactive drugs + EBL</text>
  <rect x="10" y="172" width="280" height="22" rx="4" fill="#003049"/>
  <text x="150" y="186" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#fdf0d5">Endoscopy ASAP after resuscitation!</text>
</svg>