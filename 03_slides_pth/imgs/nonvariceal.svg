<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" rx="8" fill="#f5f0e8"/>
  <rect x="0" y="0" width="300" height="34" rx="8" fill="#780000"/>
  <rect x="0" y="18" width="300" height="16" fill="#780000"/>
  <text x="150" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#fff">Non-Variceal UGIB</text>
  <rect x="10" y="42" width="280" height="20" rx="4" fill="#669bbc" opacity="0.1"/>
  <text x="150" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#003049">#1 Cause: Peptic Ulcer Disease</text>
  <text x="22" y="78" font-family="Arial,sans-serif" font-size="10" fill="#003049">Also: Erosions, Mallory-Weiss, Malignancies</text>
  <text x="22" y="96" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#780000">No role for somatostatin/terlipressin</text>
  <rect x="10" y="108" width="280" height="38" rx="5" fill="#003049"/>
  <text x="150" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#fdf0d5">Endoscopic Treatment</text>
  <text x="150" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">Thermocoagulation | Clips | Sclerosants</text>
  <rect x="10" y="152" width="135" height="20" rx="3" fill="#c1121f" opacity="0.08"/>
  <text x="77" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#c1121f">Epinephrine NOT alone</text>
  <rect x="155" y="152" width="135" height="20" rx="3" fill="#780000" opacity="0.08"/>
  <text x="222" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#780000">Surgery if endoscopy fails</text>
  <rect x="10" y="180" width="280" height="14" rx="4" fill="#669bbc" opacity="0.08"/>
  <text x="150" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#003049">Forrest Classification → Risk Stratification</text>
</svg>