<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" rx="8" fill="#f5f0e8"/>
  <rect x="0" y="0" width="300" height="34" rx="8" fill="#003049"/>
  <rect x="0" y="18" width="300" height="16" fill="#003049"/>
  <text x="150" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#fff">Gastric Varices &amp; Rescue</text>
  <rect x="10" y="42" width="135" height="55" rx="4" fill="#780000" opacity="0.08"/>
  <text x="77" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#780000">Gastric Varices</text>
  <text x="77" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#003049">Histoacryl + Lipiodol</text>
  <text x="77" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#003049">(1:1 ratio)</text>
  <text x="77" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c1121f">Banding NOT suitable</text>
  <rect x="155" y="42" width="135" height="55" rx="4" fill="#669bbc" opacity="0.1"/>
  <text x="222" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#003049">Balloon Tamponade</text>
  <text x="222" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#003049">Sengstaken-Blakemore</text>
  <text x="222" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#003049">60–90% hemostasis</text>
  <text x="222" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c1121f">Temporary bridge only</text>
  <rect x="10" y="104" width="135" height="42" rx="4" fill="#c1121f" opacity="0.06"/>
  <text x="77" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#c1121f">TIPS</text>
  <text x="77" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#003049">95% hemostasis</text>
  <text x="77" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#003049">Risk: hepatic coma</text>
  <rect x="155" y="104" width="135" height="42" rx="4" fill="#fdf0d5"/>
  <text x="222" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#003049">Surgery</text>
  <text x="222" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#003049">Distal spleno-renal shunt</text>
  <text x="222" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#003049">Refractory cases</text>
  <rect x="10" y="155" width="280" height="38" rx="5" fill="#003049"/>
  <text x="150" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#fdf0d5">Acute variceal hemorrhage: ~20% PH patients</text>
  <text x="150" y="184" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">5–10% uncontrolled → TIPS/Surgery</text>
</svg>