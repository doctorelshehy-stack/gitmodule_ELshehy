<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Section — Portal Hypertension</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform=`scale(${sc})`;s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script>
</head>
<body>
<div class="slide-content" style="width:960px;height:540px;background:#003049;overflow:hidden;position:relative;">

  

  <p style="position:absolute;top:80px;left:80px;font-family:'Times New Roman',serif;font-size:100px;font-weight:700;color:#c1121f;z-index:10;margin:0;line-height:1;">
    01
  </p>
  <p style="position:absolute;top:200px;left:80px;right:80px;font-family:'Times New Roman',serif;font-size:44px;font-weight:700;color:#fff;z-index:10;margin:0;">
    Portal Hypertension
  </p>
  <div style="position:absolute;top:260px;left:80px;width:100px;height:4px;background:#fdf0d5;z-index:10;border-radius:2px;"></div>
  <p style="position:absolute;top:295px;left:80px;right:80px;font-family:'Times New Roman',serif;font-size:18px;font-weight:400;color:rgba(255,255,255,0.7);z-index:10;margin:0;">
    A pathological increase in portal venous pressure — gradient &gt;10–12 mmHg —<br>caused by prehepatic, intrahepatic, or post-hepatic obstruction.
  </p>

  
</div>
</body>
</html>
