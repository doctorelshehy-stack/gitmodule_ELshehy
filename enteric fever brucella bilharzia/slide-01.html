<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform=`scale(${sc})`;s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script>
<title>Cover - Tropical Support 41</title>
</head>
<body>
<div class="slide-content" style="background:#264653;overflow:hidden;font-family:'Times New Roman',serif;">

<!-- Background decorative shapes -->
<svg style="position:absolute;top:0;left:0;width:960px;height:540px;z-index:0;" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <rect x="0" y="0" width="960" height="540" fill="#264653"/>
  <rect x="0" y="0" width="480" height="540" fill="#264653" opacity="0.0"/>
  <circle cx="850" cy="-50" r="300" fill="#2a9d8f" opacity="0.15"/>
  <circle cx="700" cy="400" r="250" fill="#e9c46a" opacity="0.08"/>
  <circle cx="150" cy="500" r="200" fill="#e76f51" opacity="0.1"/>
  <rect x="80" y="280" width="4" height="120" fill="#e9c46a" rx="2"/>
  <rect x="80" y="420" width="60" height="4" fill="#e9c46a" rx="2"/>
</svg>
<!-- Content -->
<div style="position:absolute;top:0;left:0;width:960px;height:540px;z-index:1;">
  <p style="position:absolute;top:160px;left:110px;font-size:22px;color:#e9c46a;font-weight:400;letter-spacing:2px;opacity:0.9;">TROPICAL GASTROENTEROLOGY</p>
  <p style="position:absolute;top:200px;left:110px;font-size:52px;color:#ffffff;font-weight:700;line-height:1.2;">Tropical Support 41<br><span style="color:#e9c46a;">Complete Review</span></p>
  <p style="position:absolute;top:330px;left:110px;font-size:18px;color:rgba(255,255,255,0.7);">Hepatic Encephalopathy &bull; Hepatopulmonary Syndrome &bull; Enteric Fever<br>Brucellosis &bull; Schistosomiasis</p>
  <div style="position:absolute;top:440px;left:110px;width:80px;height:3px;background:#f4a261;"></div>
  <p style="position:absolute;top:460px;left:110px;font-size:14px;color:rgba(255,255,255,0.5);">Comprehensive Medical Reference &mdash; All Details Included</p>
</div>
</div>
</body>
</html>
