<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform=`scale(${sc})`;s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script>
</head>
<body>
<div class="slide-content" style="background:#f8f9fa; color:#264653; position:relative; overflow:hidden; font-family:'Times New Roman',serif;">
<svg style="position:absolute; top:20px; left:50px; right:50px; z-index:1;" aria-hidden="true">
<line x1="0" y1="0" x2="860" y2="0" stroke="#2a9d8f" stroke-width="3" opacity="0.5"/>
</svg>
<p style="position:absolute; top:28px; left:50px; font-size:13px; color:#2a9d8f; font-family:'Times New Roman',serif; margin:0; z-index:10; letter-spacing:1px;">PEDIATRIC GASTRO-ENTEROLOGY, HEPATOLOGY &amp; INFECTIOUS DISEASES</p>

<svg style="position:absolute; top:80px; left:0; width:340px; height:460px; z-index:0;" aria-hidden="true">
<rect x="0" y="0" width="340" height="460" fill="#264653"/>
</svg>
<p style="position:absolute; top:120px; left:60px; font-size:80px; font-weight:700; color:#e9c46a; opacity:0.6; font-family:'Times New Roman',serif; margin:0; z-index:10;">Contents</p>
<div style="position:absolute; top:100px; left:400px; z-index:10;">
<p style="font-size:15px; font-weight:700; color:#264653; margin:0 0 10px 0;">1. &nbsp;Typhoid Fever</p>
<p style="font-size:15px; font-weight:700; color:#264653; margin:0 0 10px 0;">2. &nbsp;Brucellosis</p>
<p style="font-size:15px; font-weight:700; color:#264653; margin:0 0 10px 0;">3. &nbsp;Scarlet Fever</p>
<p style="font-size:15px; font-weight:700; color:#264653; margin:0 0 10px 0;">4. &nbsp;Pertussis (Whooping Cough)</p>
<p style="font-size:15px; font-weight:700; color:#264653; margin:0 0 10px 0;">5. &nbsp;Acute Bacterial Meningitis</p>
</div>

<svg style="position:absolute; right:32px; bottom:24px; width:40px; height:32px; z-index:100;" aria-hidden="true">
<rect x="0" y="0" width="40" height="32" rx="4" fill="#2a9d8f" opacity="0.85"/>
<text x="20" y="22" text-anchor="middle" font-family="Times New Roman,serif" font-size="14" font-weight="700" fill="#ffffff">02</text>
</svg>
</div>
</body>
</html>
