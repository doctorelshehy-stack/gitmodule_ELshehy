<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform=`scale(${sc})`;s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script>
</head>
<body>
<div class="slide-content" style="background:#f8f9fa; color:#264653; position:relative; overflow:hidden; font-family:'Times New Roman',serif;">
<svg style="position:absolute; top:20px; left:50px; right:50px; z-index:1;" aria-hidden="true">
<line x1="0" y1="0" x2="860" y2="0" stroke="#2a9d8f" stroke-width="3" opacity="0.5"/>
</svg>
<p style="position:absolute; top:28px; left:50px; font-size:13px; color:#2a9d8f; font-family:'Times New Roman',serif; margin:0; z-index:10; letter-spacing:1px;">PEDIATRIC GASTRO-ENTEROLOGY, HEPATOLOGY &amp; INFECTIOUS DISEASES</p>

<svg style="position:absolute; top:0; right:0; width:400px; height:540px; z-index:0;" aria-hidden="true">
<rect x="0" y="0" width="400" height="540" fill="#e76f51" opacity="0.06"/>
</svg>
<svg style="position:absolute; top:-60px; right:-60px; width:280px; height:280px; z-index:0;" aria-hidden="true">
<circle cx="140" cy="140" r="140" fill="#e9c46a" opacity="0.12"/>
</svg>
<div style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:5;">
<div style="position:absolute; top:100px; left:70px; width:100px; height:6px; background:#e9c46a; border-radius:3px;"></div>
<p style="position:absolute; top:100px; left:70px; font-size:22px; font-weight:400; color:#2a9d8f; font-family:'Times New Roman',serif; margin:0; letter-spacing:2px; text-transform:uppercase;">Pediatric Gastro-enterology</p>
<p style="position:absolute; top:150px; left:70px; font-size:46px; font-weight:700; color:#264653; font-family:'Times New Roman',serif; margin:0; line-height:1.2;">Bacterial</p>
<p style="position:absolute; top:210px; left:70px; font-size:46px; font-weight:700; color:#e76f51; font-family:'Times New Roman',serif; margin:0; line-height:1.2;">Infections</p>
<div style="position:absolute; top:285px; left:70px; width:160px; height:1px; background:#264653; opacity:0.25;"></div>
<p style="position:absolute; top:305px; left:70px; font-size:16px; color:#264653; font-family:'Times New Roman',serif; margin:0; opacity:0.8;">Hepatology &amp; Infectious Diseases Module</p>
<p style="position:absolute; top:335px; left:70px; font-size:14px; color:#264653; font-family:'Times New Roman',serif; margin:0; opacity:0.6;">Menoufia University — Faculty of Medicine (Accredited)</p>
<p style="position:absolute; top:365px; left:70px; font-size:14px; color:#264653; font-family:'Times New Roman',serif; margin:0; opacity:0.6;">Mansoura Faculty of Medicine</p>
</div>

<svg style="position:absolute; right:32px; bottom:24px; width:40px; height:32px; z-index:100;" aria-hidden="true">
<rect x="0" y="0" width="40" height="32" rx="4" fill="#2a9d8f" opacity="0.85"/>
<text x="20" y="22" text-anchor="middle" font-family="Times New Roman,serif" font-size="14" font-weight="700" fill="#ffffff">01</text>
</svg>
</div>
</body>
</html>
