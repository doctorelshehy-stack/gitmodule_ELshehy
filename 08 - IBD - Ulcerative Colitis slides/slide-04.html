<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform=`scale(${sc})`;s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script>
</head><body>
<div class="slide-content" style="background:#edf6f9; display:flex; flex-direction:column; padding:16px 50px 40px 50px;">
<div style="position:absolute; top:0; left:0; width:100%; height:8px; background:#006d77;"></div>
<h1 style="margin:14px 0 0 0; font-size:32px; font-weight:700; color:#006d77; font-family:Times New Roman,serif;">Pathology</h1>
<div style="width:120px; height:3px; background:#83c5be; margin:8px 0 12px 0;"></div>
<p style="font-size:16px; font-weight:700; color:#e29578; font-family:Times New Roman,serif; margin:0 0 10px 0;">DISEASE SPECTRUM</p>
<svg width="840" height="70" viewBox="0 0 840 70" style="margin-bottom:14px;">
  <rect x="0" y="10" width="840" height="40" rx="8" fill="#ffddd2" opacity="0.4"/>
  <rect x="10" y="15" width="160" height="30" rx="4" fill="#83c5be"/>
  <text x="90" y="35" text-anchor="middle" fill="#ffffff" font-size="13" font-family="Times New Roman, serif">Proctitis</text>
  <rect x="180" y="15" width="200" height="30" rx="4" fill="#006d77"/>
  <text x="280" y="35" text-anchor="middle" fill="#ffffff" font-size="13" font-family="Times New Roman, serif">Left-sided Colitis</text>
  <rect x="390" y="15" width="220" height="30" rx="4" fill="#e29578"/>
  <text x="500" y="35" text-anchor="middle" fill="#ffffff" font-size="13" font-family="Times New Roman, serif">Extensive Colitis</text>
  <rect x="620" y="15" width="210" height="30" rx="4" fill="#c1121f"/>
  <text x="725" y="35" text-anchor="middle" fill="#ffffff" font-size="13" font-family="Times New Roman, serif">Pancolitis</text>
  <text x="420" y="65" text-anchor="middle" fill="#006d77" font-size="12" font-family="Times New Roman, serif">← More Common          Less Common →</text>
</svg>
<div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; align-items:start;">
  <div style="min-width:0;">
    <p style="font-size:16px; font-weight:700; color:#e29578; font-family:Times New Roman,serif; margin:0 0 10px 0;">KEY FEATURES</p>
    <ul style="font-size:15px; color:#006d77; font-family:Times New Roman,serif; line-height:1.8; margin:0; padding-left:20px;">
      <li>Disease can involve any portion of lower bowel</li>
      <li>Rectum only (proctitis) to entire colon (pancolitis)</li>
      <li>Inflammation is <span style="font-weight:700;">diffuse</span></li>
      <li>Inflammation is <span style="font-weight:700;">continuous</span></li>
      <li>Confined to <span style="font-weight:700;">mucosa</span> only</li>
    </ul>
  </div>
  <div style="width:200px; display:flex; align-items:center; justify-content:center;">
    <svg width="180" height="160" viewBox="0 0 180 160" aria-hidden="true">
      <rect x="10" y="10" width="160" height="140" rx="20" fill="#83c5be" opacity="0.15"/>
      <rect x="30" y="30" width="120" height="100" rx="15" fill="#ffddd2" opacity="0.3"/>
      <text x="90" y="75" text-anchor="middle" fill="#006d77" font-size="14" font-weight="bold" font-family="Times New Roman, serif">Mucosal</text>
      <text x="90" y="95" text-anchor="middle" fill="#006d77" font-size="14" font-weight="bold" font-family="Times New Roman, serif">Inflammation</text>
    </svg>
  </div>
</div>
<svg style="position:absolute; right:32px; bottom:24px;" width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="#006d77" stroke="#83c5be" stroke-width="2"/><text x="20" y="25" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold" font-family="Times New Roman, serif">04</text></svg>
</div></body></html>
