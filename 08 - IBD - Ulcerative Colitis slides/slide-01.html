<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform=`scale(${sc})`;s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script>
</head>
<body>
<div class="slide-content" style="background:#edf6f9; display:flex; flex-direction:column; justify-content:center; align-items:center;">
<!-- Decorative top-left circle -->
<svg style="position:absolute; top:-60px; left:-60px;" width="200" height="200" viewBox="0 0 200 200" aria-hidden="true">
<circle cx="100" cy="100" r="100" fill="#83c5be" opacity="0.3"/>
</svg>
<!-- Decorative bottom-right circle -->
<svg style="position:absolute; bottom:-80px; right:-80px;" width="250" height="250" viewBox="0 0 250 250" aria-hidden="true">
<circle cx="125" cy="125" r="125" fill="#ffddd2" opacity="0.3"/>
</svg>
<!-- Medical cross icon -->
<svg style="position:absolute; top:40px; left:60px;" width="60" height="60" viewBox="0 0 60 60" aria-hidden="true">
<rect x="20" y="5" width="20" height="50" rx="4" fill="#006d77"/>
<rect x="5" y="20" width="50" height="20" rx="4" fill="#006d77"/>
</svg>
<!-- Main Title -->
<p style="position:absolute; top:100px; left:0; right:0; text-align:center; font-size:52px; font-weight:700; color:#006d77; font-family:Times New Roman,serif;">Ulcerative Colitis</p>
<!-- Subtitle -->
<p style="position:absolute; top:195px; left:0; right:0; text-align:center; font-size:28px; color:#e29578; font-family:Times New Roman,serif;">IBD - Inflammatory Bowel Disease</p>
<!-- Divider line -->
<div style="position:absolute; top:265px; left:380px; width:200px; height:3px; background:#83c5be; border-radius:1.5px;"></div>
<!-- Supporting text -->
<p style="position:absolute; top:275px; left:0; right:0; text-align:center; font-size:20px; color:#006d77; font-family:Times New Roman,serif; opacity:0.8;">Internal Medicine - Gastroenterology</p>
<!-- Bottom bar -->
<div style="position:absolute; bottom:0; left:0; right:0; height:8px; background:#006d77;"></div>
</div>
</body>
</html>
