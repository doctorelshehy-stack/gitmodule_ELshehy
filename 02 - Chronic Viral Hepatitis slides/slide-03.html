<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform=`scale(${sc})`;s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script>
</head>
<body>
<div class="slide-content" style="background:#f8f9fa; color:#264653; position:relative; overflow:hidden; font-family:'Times New Roman',serif;">

<svg style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:0;" aria-hidden="true">
<rect x="0" y="0" width="340" height="540" fill="#264653"/>
<rect x="340" y="0" width="620" height="540" fill="#f8f9fa"/>
</svg>

<svg style="position:absolute; top:120px; left:400px; width:180px; height:180px; z-index:5;" aria-hidden="true">
<circle cx="90" cy="90" r="85" fill="none" stroke="#2a9d8f" stroke-width="2" opacity="0.15"/>
<polygon points="50,60 130,60 148,95 144,130 130,148 90,155 50,145 38,130 32,95" fill="#2a9d8f" opacity="0.06" stroke="#2a9d8f" stroke-width="1.2"/>
</svg>

<p style="position:absolute; top:80px; left:60px; font-size:96px; font-weight:700; color:#e9c46a; opacity:0.6; font-family:'Times New Roman',serif; margin:0; z-index:10;">01</p>
<p style="position:absolute; top:160px; left:60px; font-size:18px; font-weight:400; color:#e9c46a; opacity:0.7; font-family:'Times New Roman',serif; margin:0; z-index:10; letter-spacing:3px; text-transform:uppercase;">Section</p>

<p style="position:absolute; top:240px; left:400px; font-size:42px; font-weight:700; color:#264653; font-family:'Times New Roman',serif; margin:0; z-index:10;">Definition &amp; Classification</p>
<p style="position:absolute; top:296px; left:400px; font-size:18px; color:#2a9d8f; font-family:'Times New Roman',serif; margin:0; z-index:10;">Old &amp; New Classification of Chronic Hepatitis</p>

<div style="position:absolute; top:340px; left:400px; width:120px; height:3px; background:#e9c46a; border-radius:1.5px; z-index:5;"></div>

<svg style="position:absolute; right:32px; bottom:24px; width:40px; height:32px; z-index:100;" aria-hidden="true">
<rect x="0" y="0" width="40" height="32" rx="4" fill="#2a9d8f" opacity="0.85"/>
<text x="20" y="22" text-anchor="middle" font-family="Times New Roman,serif" font-size="14" font-weight="700" fill="#ffffff">03</text>
</svg>
</div>
</body>
</html>
