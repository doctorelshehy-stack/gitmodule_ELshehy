<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform=`scale(${sc})`;s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script></head><body>
<div class="slide-content" style="background:#1b2838; overflow:hidden;">
  <svg style="position:absolute; top:0; left:0; width:960px; height:540px;" aria-hidden="true">
    <rect x="0" y="0" width="960" height="540" fill="#1b2838"/>
    <circle cx="480" cy="270" r="200" fill="#2196F3" opacity="0.05"/>
    <circle cx="480" cy="270" r="120" fill="#FFC107" opacity="0.03"/>
  </svg>
  <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:10;">
    <p style="font-family:'Times New Roman',serif; font-size:52px; font-weight:700; color:#ffffff; margin:0;">Thank You</p>
    <div style="width:100px; height:4px; background:#2196F3; border-radius:2px; margin:16px auto;"></div>
    <p style="font-family:'Times New Roman',serif; font-size:20px; color:#FF9800; margin-top:16px;">Ascites — Definition to Management</p>
    <p style="font-family:'Times New Roman',serif; font-size:14px; color:#FFC107; opacity:0.7; margin-top:8px;">Support 40 Internal GIT</p>
  </div>
  <div style="position:absolute; bottom:0; left:0; width:960px; height:6px; background:linear-gradient(to right, #2196F3, #FFC107, #E53935);"></div>
</div>
</body></html>
