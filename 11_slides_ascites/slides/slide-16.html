<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform=`scale(${sc})`;s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script></head><body>
<div class="slide-content" style="background:#ffffff; overflow:hidden;">
  <svg style="position:absolute; top:0; left:0; width:960px; height:80px;" aria-hidden="true">
    <rect x="0" y="0" width="960" height="80" fill="#1b2838"/>
    <rect x="0" y="80" width="960" height="4" fill="#2196F3"/>
  </svg>
  <div style="position:absolute; top:20px; left:60px; z-index:10;">
    <p style="font-family:'Times New Roman',serif; font-size:28px; font-weight:700; color:#ffffff; margin:0;">Albumin Therapy &amp; Renal Failure</p>
  </div>
  <div style="position:absolute; top:100px; left:60px; width:840px; z-index:10;">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
      <div>
        <p style="font-family:'Times New Roman',serif; font-size:16px; font-weight:700; color:#2196F3; margin:0 0 12px 0;">Albumin Protocol</p>
        <div style="background:#f0f4f8; padding:16px; border-radius:8px; border-left:4px solid #2196F3;">
          <p style="font-family:'Times New Roman',serif; font-size:14px; color:#1b2838; margin:0 0 8px 0;"><strong>Dose:</strong> 40 g twice/week × 2 weeks</p>
          <p style="font-family:'Times New Roman',serif; font-size:14px; color:#1b2838; margin:0 0 8px 0;">Then weekly × 16 weeks</p>
          <div style="background:#fff8e1; padding:10px 14px; border-radius:6px; margin-top:12px; border-left:3px solid #FFC107;">
            <p style="font-family:'Times New Roman',serif; font-size:14px; color:#1b2838; margin:0;"><strong style="color:#2196F3;">Decreases mortality by 38%</strong></p>
          </div>
        </div>
      </div>
      <div>
        <p style="font-family:'Times New Roman',serif; font-size:16px; font-weight:700; color:#E53935; margin:0 0 12px 0;">Hepatorenal Failure</p>
        <div style="background:#f0f4f8; padding:16px; border-radius:8px; border-left:4px solid #E53935;">
          <p style="font-family:'Times New Roman',serif; font-size:14px; color:#1b2838; line-height:1.6; margin:0 0 10px 0;">Renal failure in cirrhotic patients may be due to:</p>
          <ul style="margin:0; padding-left:18px;">
            <li style="font-family:'Times New Roman',serif; font-size:13px; color:#1b2838; margin:6px 0;">Vasodilatation from sepsis</li>
            <li style="font-family:'Times New Roman',serif; font-size:13px; color:#1b2838; margin:6px 0;">Diuretic therapy</li>
            <li style="font-family:'Times New Roman',serif; font-size:13px; color:#1b2838; margin:6px 0;">Hepatorenal failure</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
  <svg style="position:absolute; right:32px; bottom:24px; z-index:100;" width="40" height="40" aria-hidden="true">
  <circle cx="20" cy="20" r="18" fill="#1b2838" stroke="#2196F3" stroke-width="2"/>
  <text x="20" y="25" text-anchor="middle" fill="#ffffff" font-family="Times New Roman, serif" font-size="16" font-weight="bold">16</text>
</svg>
</div>
</body></html>
