<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform=`scale(${sc})`;s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script></head><body>
<div class="slide-content" style="background:#1b2838; overflow:hidden;">
  <svg style="position:absolute; top:0; left:0; width:960px; height:540px;" aria-hidden="true">
    <rect x="0" y="0" width="960" height="540" fill="#1b2838"/>
    <circle cx="820" cy="400" r="250" fill="#2196F3" opacity="0.08"/>
    <rect x="60" y="200" width="4" height="120" rx="2" fill="#FFC107"/>
  </svg>
  <div style="position:absolute; top:150px; left:100px; z-index:10;">
    <p style="font-family:'Times New Roman',serif; font-size:100px; font-weight:700; color:#2196F3; opacity:0.25; margin:0; line-height:1;">01</p>
    <p style="font-family:'Times New Roman',serif; font-size:44px; font-weight:700; color:#ffffff; margin-top:-20px;">Definition &amp; Clinical Features</p>
    <div style="width:100px; height:4px; background:#FFC107; border-radius:2px; margin-top:16px;"></div>
    <p style="font-family:'Times New Roman',serif; font-size:18px; color:#FF9800; margin-top:16px;">Pathological accumulation of fluid in the peritoneal cavity</p>
  </div>
  <svg style="position:absolute; right:32px; bottom:24px; z-index:100;" width="40" height="40" aria-hidden="true">
  <circle cx="20" cy="20" r="18" fill="#1b2838" stroke="#2196F3" stroke-width="2"/>
  <text x="20" y="25" text-anchor="middle" fill="#ffffff" font-family="Times New Roman, serif" font-size="16" font-weight="bold">03</text>
</svg>
</div>
</body></html>
