<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform=`scale(${sc})`;s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script></head><body>
<div class="slide-content" style="background:#ffffff; overflow:hidden;">
  <svg style="position:absolute; top:0; left:0; width:960px; height:80px;" aria-hidden="true">
    <rect x="0" y="0" width="960" height="80" fill="#264653"/>
    <rect x="0" y="80" width="960" height="4" fill="#2a9d8f"/>
  </svg>
  <div style="position:absolute; top:20px; left:60px; z-index:10;">
    <p style="font-family:'Times New Roman',serif; font-size:28px; font-weight:700; color:#ffffff; margin:0;">Mid-GI Bleeding — Causes by Age</p>
  </div>
  <div style="position:absolute; top:110px; left:60px; width:840px; z-index:10;">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px;">
      <!-- <40 years -->
      <div>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px;">
          <svg width="40" height="40" aria-hidden="true">
            <circle cx="20" cy="20" r="18" fill="#2a9d8f" opacity="0.2"/>
            <text x="20" y="25" text-anchor="middle" font-family="Times New Roman, serif" font-size="11" fill="#2a9d8f" font-weight="bold">&lt;40y</text>
          </svg>
          <p style="font-family:'Times New Roman',serif; font-size:18px; font-weight:700; color:#2a9d8f; margin:0;">Young Patients</p>
        </div>
        <div style="background:#f8f9fa; border-radius:8px; padding:16px; border-left:4px solid #2a9d8f;">
          <ul style="margin:0; padding-left:20px;">
            <li style="font-family:'Times New Roman',serif; font-size:14px; color:#264653; margin:8px 0;">Tumors</li>
            <li style="font-family:'Times New Roman',serif; font-size:14px; color:#264653; margin:8px 0;">Meckel's Diverticulum</li>
            <li style="font-family:'Times New Roman',serif; font-size:14px; color:#264653; margin:8px 0;">Dieulafoy Lesion</li>
            <li style="font-family:'Times New Roman',serif; font-size:14px; color:#264653; margin:8px 0;">Crohn's Disease</li>
          </ul>
        </div>
      </div>
      <!-- >40 years -->
      <div>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px;">
          <svg width="40" height="40" aria-hidden="true">
            <circle cx="20" cy="20" r="18" fill="#f4a261" opacity="0.2"/>
            <text x="20" y="25" text-anchor="middle" font-family="Times New Roman, serif" font-size="11" fill="#f4a261" font-weight="bold">&gt;40y</text>
          </svg>
          <p style="font-family:'Times New Roman',serif; font-size:18px; font-weight:700; color:#f4a261; margin:0;">Older Patients</p>
        </div>
        <div style="background:#f8f9fa; border-radius:8px; padding:16px; border-left:4px solid #f4a261;">
          <ul style="margin:0; padding-left:20px;">
            <li style="font-family:'Times New Roman',serif; font-size:14px; color:#264653; margin:8px 0;">Angiectasia</li>
            <li style="font-family:'Times New Roman',serif; font-size:14px; color:#264653; margin:8px 0;">NSAID Enteropathy</li>
            <li style="font-family:'Times New Roman',serif; font-size:14px; color:#264653; margin:8px 0;">Celiac Disease</li>
            <li style="font-family:'Times New Roman',serif; font-size:14px; color:#264653; margin:8px 0;">Hemobilia (bleeding from biliary tree)</li>
            <li style="font-family:'Times New Roman',serif; font-size:14px; color:#264653; margin:8px 0;">Hemosuccus Pancreaticus</li>
            <li style="font-family:'Times New Roman',serif; font-size:14px; color:#264653; margin:8px 0;">Aortoenteric Fistula</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
  <svg style="position:absolute; right:32px; bottom:24px; z-index:100;" width="40" height="40" aria-hidden="true">
  <circle cx="20" cy="20" r="18" fill="#264653" stroke="#2a9d8f" stroke-width="2"/>
  <text x="20" y="25" text-anchor="middle" fill="#ffffff" font-family="Times New Roman, serif" font-size="16" font-weight="bold">15</text>
</svg>
</div>
</body></html>
