<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pediatric GIT Presentation - Slide Cover</title>
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
.slide-content { width:960px; height:540px; position:relative; transform-origin:center center; }
</style>
<script>
function scaleSlide(){const s=document.querySelector('.slide-content');if(!s)return;const sx=window.innerWidth/960;const sy=window.innerHeight/540;const sc=Math.min(sx,sy);s.style.width='960px';s.style.height='540px';s.style.transform='scale('+sc+')';s.style.transformOrigin='center center';s.style.flexShrink='0';}
window.addEventListener('load',scaleSlide);window.addEventListener('resize',scaleSlide);
</script>
</head>
<body>
<div class="slide-content" style="background:#edf6f9;font-family:'Times New Roman',serif;color:#2d3436;overflow:hidden;">

<!-- decorative top wave -->
<svg width="960" height="540" viewBox="0 0 960 540" style="position:absolute;top:0;left:0;z-index:0;" aria-hidden="true">
  <rect x="0" y="0" width="960" height="540" fill="url(#coverGrad)"/>
  <defs>
    <linearGradient id="coverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#006d77"/>
      <stop offset="100%" stop-color="#004d55"/>
    </linearGradient>
  </defs>
</svg>
<!-- decorative circle -->
<svg width="400" height="400" viewBox="0 0 400 400" style="position:absolute;top:-60px;right:-60px;z-index:1;" aria-hidden="true">
  <circle cx="200" cy="200" r="200" fill="rgba(131,197,190,0.15)"/>
</svg>
<svg width="250" height="250" viewBox="0 0 250 250" style="position:absolute;bottom:30px;right:40px;z-index:1;" aria-hidden="true">
  <circle cx="125" cy="125" r="125" fill="rgba(226,149,120,0.15)"/>
</svg>
<!-- content -->
<div style="position:absolute;top:80px;left:70px;z-index:10;">
  <div style="width:80px;height:5px;background:#ffddd2;border-radius:3px;margin-bottom:20px;"></div>
  <p style="font-size:28px;color:rgba(237,246,249,0.8);margin:0 0 8px 0;font-weight:400;">Pediatric Gastro-Enterology</p>
  <p style="font-size:52px;color:#ffffff;margin:0 0 10px 0;font-weight:700;line-height:1.1;">GIT Topics</p>
  <p style="font-size:24px;color:#83c5be;margin:0 0 30px 0;font-weight:400;">Diarrhea &bull; Vomiting &bull; Constipation &bull; Abdominal Pain</p>
  <div style="width:60px;height:4px;background:#e29578;border-radius:2px;margin-bottom:20px;"></div>
  <p style="font-size:16px;color:rgba(237,246,249,0.6);margin:0;">Menoufia Faculty of Medicine</p>
  <p style="font-size:14px;color:rgba(237,246,249,0.4);margin:4px 0 0 0;">Pediatric Gastro-Enterology, Hepatology and Infectious Diseases Module</p>
</div>


</div>
</body>
</html>
